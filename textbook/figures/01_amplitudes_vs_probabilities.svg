<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
<rect x="0" y="0" width="1000" height="620" fill="#fbfcff" stroke="none" stroke-width="2" rx="0"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
  </marker>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#dbeafe"/>
    <stop offset="50%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<text x="500" y="42" fill="#1f2937" font-size="28" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Probabilities vs Amplitudes</text>
<text x="500" y="75" fill="#64748b" font-size="17" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical adds weights. Quantum adds arrows first, then squares the result.</text>
<rect x="44" y="106" width="428" height="426" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<rect x="528" y="106" width="428" height="426" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<text x="258" y="138" fill="#2563eb" font-size="24" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical probability</text>
<text x="258" y="168" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">numbers are already probabilities</text>
<text x="742" y="138" fill="#7c3aed" font-size="24" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Quantum amplitude</text>
<text x="742" y="168" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">arrows can reinforce or cancel</text>
<rect x="112" y="326" width="70" height="82" fill="#2563eb" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="147" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P1</text>
<text x="147" y="306" fill="#2563eb" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.25</text>
<rect x="216" y="326" width="70" height="82" fill="#0891b2" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="251" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P2</text>
<text x="251" y="306" fill="#0891b2" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.25</text>
<rect x="340" y="244" width="70" height="164" fill="#16a34a" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="375" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P total</text>
<text x="375" y="224" fill="#16a34a" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.50</text>
<line x1="90" y1="408" x2="434" y2="408" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<text x="199" y="344" fill="#64748b" font-size="30" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">+</text>
<text x="306" y="344" fill="#64748b" font-size="30" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">=</text>
<text x="258" y="474" fill="#16a34a" font-size="22" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P total = P1 + P2</text>
<text x="258" y="500" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Distinguish the alternatives first:</text>
<text x="258" y="520" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">then probabilities add as positive weights.</text>
<text x="742" y="204" fill="#16a34a" font-size="19" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Constructive</text>
<text x="742" y="228" fill="#64748b" font-size="14" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">same direction</text>
<line x1="595" y1="258" x2="687" y2="258" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<polygon points="700,258 687,251 687,265" fill="#2563eb" stroke="none"/>
<text x="582" y="258" fill="#2563eb" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">A1</text>
<line x1="595" y1="292" x2="687" y2="292" stroke="#0891b2" stroke-width="7" stroke-linecap="round"/>
<polygon points="700,292 687,285 687,299" fill="#0891b2" stroke="none"/>
<text x="582" y="292" fill="#0891b2" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">A2</text>
<text x="724" y="276" fill="#64748b" font-size="20" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">+</text>
<line x1="772" y1="276" x2="901" y2="276" stroke="#16a34a" stroke-width="9" stroke-linecap="round"/>
<polygon points="914,276 901,269 901,283" fill="#16a34a" stroke="none"/>
<text x="914" y="246" fill="#16a34a" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">sum arrow</text>
<text x="742" y="330" fill="#16a34a" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P = |A1 + A2|^2 is large</text>
<text x="742" y="384" fill="#dc2626" font-size="19" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Destructive</text>
<text x="742" y="408" fill="#64748b" font-size="14" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">opposite directions</text>
<line x1="595" y1="438" x2="687" y2="438" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<polygon points="700,438 687,431 687,445" fill="#2563eb" stroke="none"/>
<text x="582" y="438" fill="#2563eb" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">A1</text>
<line x1="700" y1="472" x2="608" y2="472" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
<polygon points="595,472 608,465 608,479" fill="#dc2626" stroke="none"/>
<text x="582" y="472" fill="#dc2626" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">A2</text>
<text x="724" y="455" fill="#64748b" font-size="20" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">+</text>
<circle cx="838" cy="455" r="9" fill="#7c3aed" stroke="white" stroke-width="2"/>
<text x="860" y="455" fill="#7c3aed" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">zero final arrow</text>
<text x="742" y="508" fill="#7c3aed" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P = |A1 + A2|^2 = 0</text>
<rect x="94" y="560" width="812" height="42" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="7"/>
<text x="500" y="581" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Real takeaway: cancellation happens before probability is computed.</text>
</svg>
