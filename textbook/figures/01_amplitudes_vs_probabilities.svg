<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540">
<rect x="0" y="0" width="1000" height="540" fill="#fbfcff" stroke="none" stroke-width="2" rx="0"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
  </marker>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#dbeafe"/>
    <stop offset="50%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<text x="500" y="42" fill="#1f2937" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Probabilities add after alternatives are distinguished; amplitudes add before measurement</text>
<rect x="54" y="92" width="405" height="390" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<rect x="541" y="92" width="405" height="390" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<text x="256" y="124" fill="#2563eb" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical probability</text>
<text x="744" y="124" fill="#7c3aed" font-size="22" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Quantum amplitude</text>
<text x="256" y="164" fill="#64748b" font-size="17" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">positive numbers cannot cancel</text>
<text x="744" y="164" fill="#64748b" font-size="17" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">signed/phase vectors can cancel</text>
<rect x="130" y="280" width="54" height="110" fill="#2563eb" stroke="none" stroke-width="2" rx="5" fill-opacity="0.92"/>
<text x="157" y="412" fill="#1f2937" font-size="16" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P1</text>
<text x="157" y="262" fill="#2563eb" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.5</text>
<rect x="230" y="280" width="54" height="110" fill="#0891b2" stroke="none" stroke-width="2" rx="5" fill-opacity="0.92"/>
<text x="257" y="412" fill="#1f2937" font-size="16" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P2</text>
<text x="257" y="262" fill="#0891b2" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.5</text>
<rect x="330" y="170" width="54" height="220" fill="#16a34a" stroke="none" stroke-width="2" rx="5" fill-opacity="0.92"/>
<text x="357" y="412" fill="#1f2937" font-size="16" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P total</text>
<text x="357" y="152" fill="#16a34a" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">1.0</text>
<line x1="106" y1="390" x2="395" y2="390" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<text x="256" y="440" fill="#16a34a" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.5 + 0.5 = 1.0</text>
<text x="256" y="466" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">No dark fringe is possible from probability addition alone.</text>
<line x1="600" y1="330" x2="890" y2="330" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<line x1="745" y1="425" x2="745" y2="235" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<line x1="745" y1="330" x2="847" y2="330" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="847" y1="330" x2="745" y2="330" stroke="#dc2626" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<circle cx="745" cy="330" r="5" fill="#1f2937" stroke="none" stroke-width="2"/>
<text x="803" y="306" fill="#2563eb" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">psi1 = 1</text>
<text x="805" y="360" fill="#dc2626" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">psi2 = -1</text>
<text x="745" y="440" fill="#7c3aed" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">psi1 + psi2 = 0</text>
<text x="745" y="466" fill="#1f2937" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P = |psi|^2 = 0</text>
</svg>
