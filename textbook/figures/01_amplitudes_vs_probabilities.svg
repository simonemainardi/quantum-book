<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
<rect x="0" y="0" width="1000" height="620" fill="#fbfcff" stroke="none" stroke-width="2" rx="0"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
  </marker>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#dbeafe"/>
    <stop offset="50%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<text x="500" y="42" fill="#1f2937" font-size="28" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical Probabilities vs Quantum Amplitudes</text>
<text x="500" y="75" fill="#64748b" font-size="17" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical adds nonnegative probabilities. Quantum adds directed amplitudes, then squares.</text>
<rect x="44" y="106" width="428" height="426" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<rect x="528" y="106" width="428" height="426" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<text x="258" y="138" fill="#2563eb" font-size="24" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Classical probability</text>
<text x="258" y="168" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">numbers are already probabilities</text>
<text x="742" y="138" fill="#7c3aed" font-size="24" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Quantum amplitude</text>
<text x="742" y="168" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">arrows can reinforce or cancel</text>
<rect x="112" y="326" width="70" height="82" fill="#2563eb" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="147" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P1</text>
<text x="147" y="306" fill="#2563eb" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.25</text>
<rect x="216" y="326" width="70" height="82" fill="#0891b2" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="251" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P2</text>
<text x="251" y="306" fill="#0891b2" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.25</text>
<rect x="340" y="244" width="70" height="164" fill="#16a34a" stroke="none" stroke-width="2" rx="5" fill-opacity="0.9"/>
<text x="375" y="432" fill="#1f2937" font-size="16" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P total</text>
<text x="375" y="224" fill="#16a34a" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">0.50</text>
<line x1="90" y1="408" x2="434" y2="408" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<text x="199" y="344" fill="#64748b" font-size="30" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">+</text>
<text x="306" y="344" fill="#64748b" font-size="30" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">=</text>
<text x="258" y="474" fill="#16a34a" font-size="22" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P total = P1 + P2</text>
<text x="258" y="500" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Distinguish the alternatives first:</text>
<text x="258" y="520" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">then probabilities add as positive weights.</text>
<text x="562" y="210" fill="#16a34a" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">In phase</text>
<line x1="618" y1="254" x2="858" y2="254" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<text x="562" y="340" fill="#dc2626" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">Opposite phase</text>
<line x1="618" y1="384" x2="858" y2="384" stroke="#d7dde8" stroke-width="2" stroke-linecap="round"/>
<line x1="628" y1="254" x2="701" y2="254" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<polygon points="714,254 701,247 701,261" fill="#2563eb" stroke="none"/>
<line x1="714" y1="254" x2="787" y2="254" stroke="#0891b2" stroke-width="7" stroke-linecap="round"/>
<polygon points="800,254 787,247 787,261" fill="#0891b2" stroke="none"/>
<line x1="628" y1="287" x2="787" y2="287" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
<polygon points="800,287 787,280 787,294" fill="#16a34a" stroke="none"/>
<text x="850" y="246" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">0.5 + 0.5 = 1.0</text>
<text x="850" y="277" fill="#16a34a" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">P = |1.0|^2 = 1.0</text>
<text x="620" y="318" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">add amplitudes first</text>
<line x1="628" y1="384" x2="701" y2="384" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<polygon points="714,384 701,377 701,391" fill="#2563eb" stroke="none"/>
<line x1="714" y1="384" x2="641" y2="384" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
<polygon points="628,384 641,377 641,391" fill="#dc2626" stroke="none"/>
<circle cx="628" cy="417" r="8" fill="#7c3aed" stroke="none" stroke-width="2"/>
<text x="850" y="376" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">0.5 + (-0.5) = 0</text>
<text x="850" y="407" fill="#7c3aed" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">P = |0|^2 = 0</text>
<text x="620" y="448" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">cancellation happens before squaring</text>
<rect x="94" y="560" width="812" height="42" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="7"/>
<text x="500" y="581" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Real takeaway: phase lets equal-strength paths reinforce or cancel.</text>
</svg>
