<text x="460" y="181" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">which-slit readout gives 1/2 and 1/2</text>
<text x="595" y="458" fill="#1f2937" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">screen basis: each pixel x adds two complex contributions</text>
<text x="595" y="490" fill="#7c3aed" font-size="21" font-weight="700" font-family="Inter, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">P(x) = 1/2 |&lt;x|L&gt; + &lt;x|R&gt;|^2</text>
