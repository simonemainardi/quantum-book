<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
<rect x="0" y="0" width="1000" height="620" fill="#fbfcff" stroke="none" stroke-width="2" rx="0"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
  </marker>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#dbeafe"/>
    <stop offset="50%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<text x="500" y="38" fill="#1f2937" font-size="26" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Bloch sphere reference states</text>
<text x="500" y="68" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Opposite endpoints are orthogonal states.</text>
<text x="500" y="94" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">X, Y, and Z are perpendicular measurement axes.</text>
<rect x="35" y="118" width="340" height="390" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
<text x="205" y="154" fill="#1f2937" font-size="22" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">How to read it</text>
<text x="205" y="202" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">One basis = one axis</text>
<text x="205" y="234" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">opposite endpoints are</text>
<text x="205" y="258" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">orthogonal measurement answers</text>
<text x="205" y="304" fill="#1f2937" font-size="17" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Basis pairs</text>
<text x="205" y="338" fill="#2563eb" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Z: |0&gt;, |1&gt;</text>
<text x="205" y="372" fill="#16a34a" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">X: |+&gt;, |-&gt;</text>
<text x="205" y="406" fill="#7c3aed" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Y: |+i&gt;, |-i&gt;</text>
<text x="205" y="456" fill="#1f2937" font-size="15" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">&lt;0|1&gt; = &lt;+|-&gt; = &lt;+i|-i&gt; = 0</text>
<text x="205" y="482" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Axes X, Y, Z are perpendicular.</text>
