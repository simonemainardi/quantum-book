<text x="646" y="487.8" fill="#dc2626" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">|1&gt;</text>
<line x1="751.2" y1="369.8" x2="769.2" y2="375.8" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="751.2" cy="369.8" r="10" fill="#16a34a" stroke="white" stroke-width="3"/>
<text x="777.2" y="375.8" fill="#16a34a" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">|+&gt;</text>
<line x1="488.8" y1="280.2" x2="470.8" y2="270.2" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="488.8" cy="280.2" r="10" fill="#d97706" stroke="white" stroke-width="3"/>
<text x="462.8" y="270.2" fill="#d97706" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">|-&gt;</text>
<line x1="564" y1="417.8" x2="542" y2="461.8" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="564" cy="417.8" r="10" fill="#7c3aed" stroke="white" stroke-width="3"/>
<text x="534" y="461.8" fill="#7c3aed" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">|+i&gt;</text>
<line x1="676" y1="232.2" x2="698" y2="190.2" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="676" cy="232.2" r="10" fill="#be185d" stroke="white" stroke-width="3"/>
<text x="706" y="190.2" fill="#be185d" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">|-i&gt;</text>
<text x="500" y="552" fill="#1f2937" font-size="15" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">The dots are the basis states; the colored lines are the measurement axes.</text>
<text x="500" y="580" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">States on different axes are not generally orthogonal.</text>
<text x="500" y="604" fill="#64748b" font-size="15" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">For example, |0&gt; and |+&gt; have 50/50 overlap.</text>
</svg>
