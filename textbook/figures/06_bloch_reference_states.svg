<line x1="488.8" y1="280.2" x2="751.2" y2="369.8" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
<line x1="676" y1="232.2" x2="564" y2="417.8" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
