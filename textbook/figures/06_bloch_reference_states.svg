<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540">
<rect x="0" y="0" width="1000" height="540" fill="#fbfcff" stroke="none" stroke-width="2" rx="0"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
  </marker>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#dbeafe"/>
    <stop offset="50%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<text x="500" y="40" fill="#1f2937" font-size="26" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Bloch sphere reference states</text>
<text x="500" y="70" fill="#64748b" font-size="16" font-weight="500" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">Z reveals magnitude imbalance; X and Y reveal relative phase.</text>
<circle cx="500" cy="295" r="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
<ellipse cx="500" cy="295" rx="170" ry="62.9" fill="none" stroke="#d7dde8" stroke-width="2"/>
<ellipse cx="500" cy="295" rx="62.9" ry="170" fill="none" stroke="#d7dde8" stroke-width="2" transform="rotate(-27 500 295)"/>
<line x1="500" y1="295" x2="500" y2="162.4" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="516" y="150.4" fill="#64748b" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">+Z</text>
<line x1="500" y1="295" x2="500" y2="427.6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="516" y="439.6" fill="#64748b" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">-Z</text>
<line x1="500" y1="295" x2="639.4" y2="342.6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="655.4" y="354.6" fill="#64748b" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="start" dominant-baseline="middle">+X</text>
<line x1="500" y1="295" x2="360.6" y2="247.4" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="344.6" y="235.4" fill="#64748b" font-size="14" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">-X</text>
<line x1="500" y1="295" x2="440.5" y2="393.6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
