<circle cx="620" cy="200.2" r="10" fill="#2563eb" stroke="white" stroke-width="3"/>
<text x="594" y="164.2" fill="#2563eb" font-size="18" font-weight="700" font-family="Inter, &quot;Noto Sans&quot;, &quot;DejaVu Sans&quot;, &quot;Arial Unicode MS&quot;, Arial, sans-serif" text-anchor="end" dominant-baseline="middle">|0&gt;</text>
<line x1="620" y1="449.8" x2="638" y2="487.8" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
