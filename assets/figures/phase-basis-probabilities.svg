<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Phase probabilities in Z X and Y bases">
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="0.54" stop-color="#f7efe1"/>
      <stop offset="1" stop-color="#e9f3f0"/>
    </linearGradient>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101927"/>
      <stop offset="0.55" stop-color="#19323f"/>
      <stop offset="1" stop-color="#2a4f50"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="58%">
      <stop offset="0" stop-color="#f7d98c" stop-opacity="0.55"/>
      <stop offset="0.52" stop-color="#0f8b8d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#101927" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#14202e" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="context-stroke"/>
    </marker>
    <style>
      .title { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; font-size: 54px; font-weight: 700; fill: #14202e; }
      .h2 { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #14202e; }
      .label { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 19px; fill: #14202e; }
      .small { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 15px; fill: #5d6877; }
      .formula { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; fill: #14202e; }
      .hair { stroke: rgba(20,32,46,0.16); stroke-width: 1.2; }
      .axis { stroke: rgba(20,32,46,0.42); stroke-width: 2; }
    </style>
    
  </defs>
  
  <rect width="1200" height="760" fill="url(#paper)"/>
  <text x="62" y="74" class="title">Same State, Three Measurement Bases</text>
  <text x="66" y="116" class="small">&#952; = 60 degrees. Z ignores phase; X and Y reveal it as interference.</text>
  <g filter="url(#softShadow)"><rect x="50" y="138" width="1100" height="558" rx="24" fill="#fffdfa" fill-opacity="0.88"/></g>
  
    <text x="98" y="156" class="h2">Z basis</text>
    <line x1="98" y1="283" x2="1048" y2="283" class="axis"/>
    <line x1="98" y1="178" x2="98" y2="283" class="axis"/>
    <polyline points="98.0,204.2 414.7,204.2 731.3,204.2 1048.0,204.2" fill="none" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="98.0,256.8 414.7,256.8 731.3,256.8 1048.0,256.8" fill="none" stroke="#e76f51" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="98.0" cy="204.2" r="7" fill="#0f8b8d"/><circle cx="414.7" cy="204.2" r="7" fill="#0f8b8d"/><circle cx="731.3" cy="204.2" r="7" fill="#0f8b8d"/><circle cx="1048.0" cy="204.2" r="7" fill="#0f8b8d"/>
    <circle cx="98.0" cy="256.8" r="7" fill="#e76f51"/><circle cx="414.7" cy="256.8" r="7" fill="#e76f51"/><circle cx="731.3" cy="256.8" r="7" fill="#e76f51"/><circle cx="1048.0" cy="256.8" r="7" fill="#e76f51"/>
    <line x1="98.0" y1="283" x2="98.0" y2="291" stroke="#14202e" stroke-width="2"/><text x="84.0" y="314" class="small">0</text><line x1="414.7" y1="283" x2="414.7" y2="291" stroke="#14202e" stroke-width="2"/><text x="400.7" y="314" class="small">pi/2</text><line x1="731.3" y1="283" x2="731.3" y2="291" stroke="#14202e" stroke-width="2"/><text x="717.3" y="314" class="small">pi</text><line x1="1048.0" y1="283" x2="1048.0" y2="291" stroke="#14202e" stroke-width="2"/><text x="1034.0" y="314" class="small">3pi/2</text>
    <text x="1076" y="210" class="label" fill="#0f8b8d">P(0)</text>
    <text x="1076" y="250" class="label" fill="#e76f51">P(1)</text>

    <text x="98" y="326" class="h2">X basis</text>
    <line x1="98" y1="453" x2="1048" y2="453" class="axis"/>
    <line x1="98" y1="348" x2="98" y2="453" class="axis"/>
    <polyline points="98.0,355.0 414.7,400.5 731.3,446.0 1048.0,400.5" fill="none" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="98.0,446.0 414.7,400.5 731.3,355.0 1048.0,400.5" fill="none" stroke="#e76f51" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="98.0" cy="355.0" r="7" fill="#0f8b8d"/><circle cx="414.7" cy="400.5" r="7" fill="#0f8b8d"/><circle cx="731.3" cy="446.0" r="7" fill="#0f8b8d"/><circle cx="1048.0" cy="400.5" r="7" fill="#0f8b8d"/>
    <circle cx="98.0" cy="446.0" r="7" fill="#e76f51"/><circle cx="414.7" cy="400.5" r="7" fill="#e76f51"/><circle cx="731.3" cy="355.0" r="7" fill="#e76f51"/><circle cx="1048.0" cy="400.5" r="7" fill="#e76f51"/>
    <line x1="98.0" y1="453" x2="98.0" y2="461" stroke="#14202e" stroke-width="2"/><text x="84.0" y="484" class="small">0</text><line x1="414.7" y1="453" x2="414.7" y2="461" stroke="#14202e" stroke-width="2"/><text x="400.7" y="484" class="small">pi/2</text><line x1="731.3" y1="453" x2="731.3" y2="461" stroke="#14202e" stroke-width="2"/><text x="717.3" y="484" class="small">pi</text><line x1="1048.0" y1="453" x2="1048.0" y2="461" stroke="#14202e" stroke-width="2"/><text x="1034.0" y="484" class="small">3pi/2</text>
    <text x="1076" y="380" class="label" fill="#0f8b8d">P(+)</text>
    <text x="1076" y="420" class="label" fill="#e76f51">P(-)</text>

    <text x="98" y="496" class="h2">Y basis</text>
    <line x1="98" y1="623" x2="1048" y2="623" class="axis"/>
    <line x1="98" y1="518" x2="98" y2="623" class="axis"/>
    <polyline points="98.0,570.5 414.7,525.0 731.3,570.5 1048.0,616.0" fill="none" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="98.0,570.5 414.7,616.0 731.3,570.5 1048.0,525.0" fill="none" stroke="#e76f51" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="98.0" cy="570.5" r="7" fill="#0f8b8d"/><circle cx="414.7" cy="525.0" r="7" fill="#0f8b8d"/><circle cx="731.3" cy="570.5" r="7" fill="#0f8b8d"/><circle cx="1048.0" cy="616.0" r="7" fill="#0f8b8d"/>
    <circle cx="98.0" cy="570.5" r="7" fill="#e76f51"/><circle cx="414.7" cy="616.0" r="7" fill="#e76f51"/><circle cx="731.3" cy="570.5" r="7" fill="#e76f51"/><circle cx="1048.0" cy="525.0" r="7" fill="#e76f51"/>
    <line x1="98.0" y1="623" x2="98.0" y2="631" stroke="#14202e" stroke-width="2"/><text x="84.0" y="654" class="small">0</text><line x1="414.7" y1="623" x2="414.7" y2="631" stroke="#14202e" stroke-width="2"/><text x="400.7" y="654" class="small">pi/2</text><line x1="731.3" y1="623" x2="731.3" y2="631" stroke="#14202e" stroke-width="2"/><text x="717.3" y="654" class="small">pi</text><line x1="1048.0" y1="623" x2="1048.0" y2="631" stroke="#14202e" stroke-width="2"/><text x="1034.0" y="654" class="small">3pi/2</text>
    <text x="1076" y="550" class="label" fill="#0f8b8d">P(+i)</text>
    <text x="1076" y="590" class="label" fill="#e76f51">P(-i)</text>

  <text x="538" y="720" class="small">&#966; phase angle</text>

</svg>
