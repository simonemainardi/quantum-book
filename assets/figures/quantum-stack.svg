<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-label="Quantum computing stack">
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="0.54" stop-color="#f7efe1"/>
      <stop offset="1" stop-color="#e9f3f0"/>
    </linearGradient>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101927"/>
      <stop offset="0.55" stop-color="#19323f"/>
      <stop offset="1" stop-color="#2a4f50"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="58%">
      <stop offset="0" stop-color="#f7d98c" stop-opacity="0.55"/>
      <stop offset="0.52" stop-color="#0f8b8d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#101927" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#14202e" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="context-stroke"/>
    </marker>
    <style>
      .title { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; font-size: 54px; font-weight: 700; fill: #14202e; }
      .h2 { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #14202e; }
      .label { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 19px; fill: #14202e; }
      .small { font-family: Avenir Next, Segoe UI, Helvetica, Arial, sans-serif; font-size: 15px; fill: #5d6877; }
      .formula { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; fill: #14202e; }
      .hair { stroke: rgba(20,32,46,0.16); stroke-width: 1.2; }
      .axis { stroke: rgba(20,32,46,0.42); stroke-width: 2; }
    </style>
    
  </defs>
  
  <rect width="1120" height="720" fill="url(#paper)"/>
  <text x="62" y="80" class="title">Where The Math Touches Machines</text>
  <text x="66" y="124" class="small">Quantum software is a control stack: abstract vectors become physical rotations and readout events.</text>
  
  <g filter="url(#softShadow)">
    <rect x="100" y="150" width="820" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="132" cy="179" r="12" fill="#0f8b8d"/>
  <text x="158" y="174" class="label">Hardware</text>
  <text x="158" y="198" class="small">Josephson junctions, trapped ions, spins, photons</text>

  <g filter="url(#softShadow)">
    <rect x="134" y="232" width="800" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="166" cy="261" r="12" fill="#f2b84b"/>
  <text x="192" y="256" class="label">Control pulses</text>
  <text x="192" y="280" class="small">microwave, laser, voltage, timing calibration</text>

  <g filter="url(#softShadow)">
    <rect x="168" y="314" width="780" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="200" cy="343" r="12" fill="#e76f51"/>
  <text x="226" y="338" class="label">Gates</text>
  <text x="226" y="362" class="small">H, X, Y, Z, Rz, Rx, Ry, CNOT</text>

  <g filter="url(#softShadow)">
    <rect x="202" y="396" width="760" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="234" cy="425" r="12" fill="#2f6fbb"/>
  <text x="260" y="420" class="label">Circuits</text>
  <text x="260" y="444" class="small">prepare, entangle, interfere, measure</text>

  <g filter="url(#softShadow)">
    <rect x="236" y="478" width="740" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="268" cy="507" r="12" fill="#3a9f6b"/>
  <text x="294" y="502" class="label">Algorithms</text>
  <text x="294" y="526" class="small">simulation, search, phase estimation, sampling</text>

  <g filter="url(#softShadow)">
    <rect x="270" y="560" width="720" height="58" rx="16" fill="#fffdfa"/>
  </g>
  <circle cx="302" cy="589" r="12" fill="#9b5de5"/>
  <text x="328" y="584" class="label">Applications</text>
  <text x="328" y="608" class="small">chemistry, materials, optimization, sensing</text>

  <path d="M 966 164 C 1065 240, 1065 516, 928 612" fill="none" stroke="#e76f51" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <text x="802" y="646" class="formula">calibrate -> compose -> measure -> learn</text>

</svg>
